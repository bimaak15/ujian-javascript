<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Praktikum Java Script</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-md shadow-sm border border-gray-200">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">SOAL PRAKTIKUM JAVA SCRIPT</h1>

        <div class="mb-8 p-4 bg-gray-50 rounded border border-gray-200 overflow-x-auto">
            <h3 class="font-semibold mb-2 text-gray-600">Hasil Output script.js:</h3>
            <!-- Script ditaruh di sini agar document.writeln muncul di bagian atas -->
            <script src="script.js"></script>
        </div>

        <hr class="my-8">

        <!-- Bagian 2 -->
        <div class="space-y-6">
            <h2 class="text-xl font-bold text-blue-700">2. Perkalian, Pembagian, dan Tanggal</h2>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h4 class="font-bold mb-4 text-blue-800">A. Perkalian dan Pembagian</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm text-gray-600">1st Number :</label>
                            <input type="number" id="num1"
                                class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">2nd Number :</label>
                            <input type="number" id="num2"
                                class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button onclick="multiply()"
                                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition font-medium">Multiply</button>
                            <button onclick="divide()"
                                class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded transition font-medium">Divide</button>
                        </div>
                        <p class="mt-4 p-2 bg-white rounded border text-center font-bold text-gray-700">
                            Hasilnya : <span id="result" class="text-blue-600">0</span>
                        </p>
                    </div>
                </div>

                <div class="bg-green-50 p-4 rounded-lg border border-green-100">
                    <h4 class="font-bold mb-4 text-green-800">B. Format Tanggal Saat Ini</h4>
                    <div id="dateOutput"
                        class="bg-white p-4 rounded border border-green-200 font-mono text-sm leading-relaxed">
                        Memuat tanggal...
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
